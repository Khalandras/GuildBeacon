name: Discord patchnotes

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: GuildBeacon · Addon WoW
      PROJECT_URL: https://github.com/Khalandras/GuildBeacon
      WEBHOOK_AVATAR: https://khalandras.eu/patchnotes-icon
      AUTHOR_ICON: https://raw.githubusercontent.com/Khalandras/GuildBeacon/main/docs/assets/guildbeacon-icon.png
      THUMBNAIL_URL: https://khalandras.eu/patchnotes-icon
      FOOTER_ICON: https://khalandras.eu/patchnotes-icon
      DISCORD_USERNAME: Patchnotes · Addon
      FOOTER_TEXT: Patchnotes · Addon WoW · GuildBeacon
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      COMMITS_JSON: ${{ toJson(github.event.commits) }}
      COMPARE_URL: ${{ github.event.compare }}
      BRANCH_NAME: ${{ github.ref_name }}
    steps:
      - name: Post to Discord
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK_URL secret is not set, skipping."
            exit 0
          fi

          case "$BRANCH_NAME" in
            main|master) BRANCH_LABEL="Production" ;;
            develop|dev) BRANCH_LABEL="Développement" ;;
            *) BRANCH_LABEL="$BRANCH_NAME" ;;
          esac

          commit_count="$(echo "$COMMITS_JSON" | jq 'length')"
          if [[ "$commit_count" -eq 0 ]]; then
            echo "No commits in push payload, skipping."
            exit 0
          fi

          while read -r commit; do
            commit_id="$(echo "$commit" | jq -r '.id')"
            commit_url="$(echo "$commit" | jq -r '.url')"
            commit_timestamp="$(echo "$commit" | jq -r '.timestamp')"
            commit_message="$(echo "$commit" | jq -r '.message')"

            mapfile -t MSG_LINES < <(printf '%s\n' "$commit_message")
            subject="${MSG_LINES[0]:-}"

            body_lines=()
            for ((i = 1; i < ${#MSG_LINES[@]}; i++)); do
              line="${MSG_LINES[$i]}"
              [[ "$line" =~ ^Co-authored-by: ]] && continue
              body_lines+=("$line")
            done

            while [[ ${#body_lines[@]} -gt 0 && -z "${body_lines[0]// }" ]]; do
              body_lines=("${body_lines[@]:1}")
            done
            while [[ ${#body_lines[@]} -gt 0 && -z "${body_lines[-1]// }" ]]; do
              unset 'body_lines[-1]'
            done

            body=""
            if [[ ${#body_lines[@]} -gt 0 ]]; then
              body="$(printf '%s\n' "${body_lines[@]}")"
            fi

            commit_type="other"
            subject_rest="$subject"
            cc_prefix_re='^(feat|fix|perf|ci)(\([^)]+\))?!?:[[:space:]]*(.*)$'
            other_prefix_re='^[a-zA-Z]+(\([^)]+\))?!?:[[:space:]]*(.*)$'
            if [[ "$subject" =~ $cc_prefix_re ]]; then
              commit_type="${BASH_REMATCH[1]}"
              subject_rest="${BASH_REMATCH[3]}"
            elif [[ "$subject" =~ $other_prefix_re ]]; then
              subject_rest="${BASH_REMATCH[2]}"
            fi

            case "$commit_type" in
              feat)
                embed_color=13223842
                type_label="Nouveauté"
                type_emoji="✨"
                ;;
              fix)
                embed_color=7019834
                type_label="Correction"
                type_emoji="🛠️"
                ;;
              perf)
                embed_color=12042742
                type_label="Performance"
                type_emoji="⚡"
                ;;
              ci)
                embed_color=4473924
                type_label="Infrastructure"
                type_emoji="⚙️"
                ;;
              *)
                embed_color=7019834
                type_label="Mise à jour"
                type_emoji="📜"
                ;;
            esac

            title="${type_emoji} ${type_label} · ${subject_rest}"
            if [[ ${#title} -gt 240 ]]; then
              title="${title:0:237}..."
            fi

            short_sha="${commit_id:0:7}"
            meta=$'🌐 '"${BRANCH_LABEL}"$' · [`'"${short_sha}"$'`]('"${commit_url}"$') · [Voir les changements]('"${COMPARE_URL}"$')'

            if [[ -n "$body" ]]; then
              description="${body}"$'\n\n'"${meta}"
            else
              description="$meta"
            fi

            payload="$(jq -n \
              --arg username "$DISCORD_USERNAME" \
              --arg avatar_url "$WEBHOOK_AVATAR" \
              --arg author_name "$PROJECT_NAME" \
              --arg author_url "$PROJECT_URL" \
              --arg author_icon "$AUTHOR_ICON" \
              --arg title "$title" \
              --arg description "$description" \
              --argjson color "$embed_color" \
              --arg thumbnail "$THUMBNAIL_URL" \
              --arg footer_text "$FOOTER_TEXT" \
              --arg footer_icon "$FOOTER_ICON" \
              --arg timestamp "$commit_timestamp" \
              '{
                username: $username,
                avatar_url: $avatar_url,
                embeds: [{
                  author: {
                    name: $author_name,
                    url: $author_url,
                    icon_url: $author_icon
                  },
                  title: $title,
                  description: $description,
                  color: $color,
                  thumbnail: { url: $thumbnail },
                  footer: {
                    text: $footer_text,
                    icon_url: $footer_icon
                  },
                  timestamp: $timestamp
                }]
              }')"

            curl -fsS -X POST \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "$DISCORD_WEBHOOK_URL"
          done < <(echo "$COMMITS_JSON" | jq -c '.[]')
